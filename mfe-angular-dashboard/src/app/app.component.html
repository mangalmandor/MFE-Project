<div class="min-h-screen bg-black text-white p-8 font-sans">
  
  <nav class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
    <div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
        WebGen Studio
      </h1>
      <p class="text-gray-400 mt-1">Welcome back, {{ userName }}</p>
    </div>
    
   <div class="flex items-center gap-6">
      
      <div 
        (click)="goToCart()" 
        class="relative bg-gray-900 px-4 py-2 rounded-lg border border-gray-700 flex items-center gap-2 cursor-pointer hover:bg-gray-800 hover:border-blue-500 transition duration-300">
        <span>🛒 Cart:</span>
        <span class="text-blue-400 font-bold">{{ cart.length }} items</span>
        <span class="text-green-400 text-sm ml-2">(₹{{ cartTotal }})</span>
      </div>
      
      <button (click)="logout()" class="px-4 py-2 bg-red-900/30 text-red-400 border border-red-800 rounded-lg hover:bg-red-800 hover:text-white transition">
        Logout
      </button>
    </div>
  </nav>

  <div>
    <h2 class="text-xl font-semibold mb-6 text-gray-300">Available Products</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
      
      @for (product of products; track product.id) {
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 hover:border-blue-500/50 transition duration-300 flex flex-col justify-between">
          
          <div>
            <div class="text-4xl mb-4">{{ product.icon }}</div>
            <h3 class="text-lg font-bold text-gray-100">{{ product.name }}</h3>
            <p class="text-gray-500 text-sm mt-2 line-clamp-2">{{ product.description }}</p>
          </div>
          
          <div class="mt-6 flex items-center justify-between">
            <span class="text-xl font-bold text-green-400">₹{{ product.price }}</span>
            <button 
              (click)="addToCart(product)"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition">
              Add to Cart
            </button>
          </div>

        </div>
      } @empty {
        <p class="text-gray-500">No products available.</p>
      }

    </div>
  </div>

</div>
